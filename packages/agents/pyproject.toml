[project]
name = "dataguard-agents"
version = "0.1.0"
description = "Autonomous agents for DataGuard: TriageAgent, WatchdogAgent"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "dataguard-core",
    "dataguard-adapters",
    "pipeline-sentinel",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dataguard_agents"]

[tool.uv.sources]
dataguard-core = { workspace = true }
dataguard-adapters = { workspace = true }
pipeline-sentinel = { workspace = true }

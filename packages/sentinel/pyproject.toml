[project]
name = "pipeline-sentinel"
version = "0.1.0"
description = "Pipeline Sentinel — MCP-native agentic triage for data pipeline failures"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
keywords = ["data-pipelines", "observability", "mcp", "ai-agent", "airflow", "argo"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
]
dependencies = [
    "dataguard-core",
    "dataguard-adapters",
    "mcp>=1.0",
    "fastapi>=0.111",
    "uvicorn[standard]>=0.30",
    "typer>=0.12",
    "openlineage-python>=1.15",
    "rich>=13.7",
]

[project.scripts]
pipeline-sentinel = "pipeline_sentinel.cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pipeline_sentinel"]

[tool.uv.sources]
dataguard-core = { workspace = true }
dataguard-adapters = { workspace = true }
